version: "3.9"

services:
  api:
    build: .
    container_name: ai-news-api

    ports:
      - "8001:8000"

    env_file:
      - .env

    depends_on:
      - postgres
      - redis

  worker:
    build: .
    container_name: ai-news-worker

    command: celery -A app.workers.celery_app worker --loglevel=info

    env_file:
      - .env

    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16

    container_name: news-db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: news

    ports: [] 

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

    container_name: news-redis

    ports: [] 

volumes:
  postgres_data: