version: "3.9"

services:

  api:
    build: .
    ports:
      - "8001:8000"
    env_file:
      - .env
    depends_on:
      - redis
      - postgres

  worker:
    build: .
    command: celery -A app.workers.celery_app worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
      - postgres

  beat:
    build: .
    command: celery -A app.workers.celery_app beat --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:7
    container_name: news-redis

  postgres:
    image: postgres:16
    container_name: news-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: news
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: